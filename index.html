<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e96b3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="XWordbook">
  <title>XWordbook</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon-192.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Offline German Vocabulary</p>
        <h1>XWordbook</h1>
      </div>
      <button class="icon-button" id="themeToggle" type="button" aria-label="Toggle color theme">◐</button>
    </header>

    <main class="main-content">
      <section class="view view-active" id="view-list" aria-labelledby="list-heading">
        <h2 class="section-heading" id="list-heading">Words</h2>

        <div class="list-display-toggle" role="group" aria-label="Collapsed word display">
          <button class="display-toggle-button active" id="showGermanButton" type="button" data-display-language="german">Show German</button>
          <button class="display-toggle-button" id="showChineseButton" type="button" data-display-language="chinese">Show Chinese</button>
        </div>

        <div class="word-list-wrap">
          <div class="word-list" id="wordList" aria-live="polite"></div>
        </div>
        <div class="panel empty-state hidden" id="emptyState">
          <h3>No words yet</h3>
          <p>Add your first vocabulary pair to start building the notebook.</p>
        </div>
      </section>

      <section class="view" id="view-form" aria-labelledby="form-heading">
        <div class="panel">
          <div class="panel-header">
            <div>
              <p class="panel-label">Editor</p>
              <h2 id="form-heading">Add or update a word</h2>
            </div>
            <button class="text-button" id="cancelEditButton" type="button">Back</button>
          </div>

          <form id="wordForm" novalidate>
            <input id="wordId" type="hidden">

            <label class="field">
              <span>Chinese</span>
              <input id="chineseInput" name="chinese" type="text" maxlength="120" required>
            </label>

            <label class="field">
              <span>German</span>
              <input id="germanInput" name="german" type="text" maxlength="120" required>
            </label>

            <label class="field">
              <span>Note</span>
              <textarea id="noteInput" name="note" rows="4" maxlength="400" placeholder="Optional context or example"></textarea>
            </label>

            <label class="field">
              <span>Category</span>
              <select id="categoryInput" name="category">
                <option value="needs-review">Needs review</option>
                <option value="learning" selected>Learning</option>
                <option value="confident">Confident</option>
              </select>
            </label>

            <p class="form-error" id="formError" role="alert"></p>

            <div class="form-actions">
              <button class="primary-button" type="submit">Save word</button>
              <button class="secondary-button" id="resetFormButton" type="button">Reset</button>
            </div>
          </form>
        </div>
      </section>

      <section class="view" id="view-review" aria-labelledby="review-heading">
        <div class="panel">
          <div class="panel-header">
            <div>
              <p class="panel-label">Study session</p>
              <h2 id="review-heading">Review</h2>
            </div>
            <button class="text-button" id="closeReviewButton" type="button">Back</button>
          </div>

          <div class="review-toolbar">
            <div class="field review-level-field">
              <span>Review categories</span>
              <div class="review-level-picker" id="reviewLevelPicker" role="group" aria-label="Select review categories">
                <button class="level-chip active" type="button" data-review-category="needs-review" aria-pressed="true">Needs review</button>
                <button class="level-chip active" type="button" data-review-category="learning" aria-pressed="true">Learning</button>
                <button class="level-chip active" type="button" data-review-category="confident" aria-pressed="true">Confident</button>
              </div>
            </div>
            <button class="secondary-button" id="shuffleReviewButton" type="button">Shuffle deck</button>
          </div>

          <div class="review-statusline">
            <span id="reviewStepText">Think first, then reveal.</span>
            <span id="reviewRemainingText">0 left</span>
          </div>

          <div class="progress-row">
            <span id="reviewProgressText">0 / 0</span>
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="reviewProgressFill"></div>
            </div>
          </div>

          <button class="flashcard" id="flashcardButton" type="button" aria-live="polite">
            <span class="flashcard-side-label" id="flashcardLabel">Chinese</span>
            <strong id="flashcardPrimary">No word available</strong>
            <span id="flashcardSecondary">Add vocabulary and open review again.</span>
          </button>

          <div class="review-meta" id="reviewMeta"></div>

          <div class="review-actions hidden" id="reviewAnswerActions">
            <button class="danger-button" id="reviewDontKnowButton" type="button">Don't know</button>
            <button class="secondary-button" id="reviewMediumButton" type="button">Medium</button>
            <button class="primary-button" id="reviewKnowButton" type="button">Know it</button>
          </div>

          <div class="utility-row review-flow-actions">
            <button class="primary-button" id="revealButton" type="button">Show answer</button>
            <button class="secondary-button" id="nextReviewButton" type="button">Skip for now</button>
          </div>
        </div>
      </section>

      <section class="view" id="view-tools" aria-labelledby="tools-heading">
        <div class="panel">
          <div class="panel-header">
            <div>
              <p class="panel-label">Search & tools</p>
              <h2 id="tools-heading">Find, filter, and move data</h2>
            </div>
          </div>

          <div class="controls-panel">
            <label class="field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Chinese or German">
            </label>

          <div class="control-row">
            <label class="field">
              <span>Category</span>
              <select id="filterStatus">
                <option value="all">All</option>
                <option value="needs-review">Needs review</option>
                <option value="learning">Learning</option>
                <option value="confident">Confident</option>
              </select>
            </label>

            <label class="field">
              <span>Sort</span>
              <select id="sortBy">
                <option value="createdAt-desc">Newest</option>
                <option value="createdAt-asc">Oldest</option>
                <option value="category-desc">Category high to low</option>
                <option value="category-asc">Category low to high</option>
              </select>
            </label>
            </div>

            <div class="utility-row">
              <button class="secondary-button" id="exportButton" type="button">Export JSON</button>
              <label class="secondary-button file-button">
                <input id="importInput" type="file" accept="application/json">
                Import JSON
              </label>
            </div>
          </div>
        </div>
      </section>
    </main>

    <nav class="tabbar" aria-label="Primary navigation">
      <button class="tabbar-button active" type="button" data-view="list">Words</button>
      <button class="tabbar-button" type="button" data-view="form">Add</button>
      <button class="tabbar-button" type="button" data-view="review">Review</button>
      <button class="tabbar-button" type="button" data-view="tools">Tools</button>
    </nav>
  </div>

  <template id="wordItemTemplate">
    <article class="panel word-card">
      <button class="word-summary-button" type="button">
        <div class="word-summary-main">
          <h3 class="word-german"></h3>
          <p class="word-summary-hint">Tap to view details</p>
        </div>
        <div class="word-summary-side">
          <span class="word-level"></span>
          <span class="word-expand-indicator" aria-hidden="true">+</span>
        </div>
      </button>
      <div class="word-details hidden">
        <label class="field word-inline-field">
          <span>Chinese</span>
          <input class="word-inline-input word-chinese-input" type="text" maxlength="120">
        </label>
        <label class="field word-inline-field">
          <span>German</span>
          <input class="word-inline-input word-german-input" type="text" maxlength="120">
        </label>
        <label class="field word-inline-field">
          <span>Note</span>
          <textarea class="word-inline-input word-note-input" rows="3" maxlength="400" placeholder="Optional note"></textarea>
        </label>
        <div class="word-meta">
          <span class="word-remembered"></span>
          <span class="word-updated"></span>
        </div>
        <div class="word-move-actions"></div>
        <div class="word-actions">
          <button class="secondary-button word-edit-button" type="button">Edit</button>
          <button class="danger-button word-delete-button" type="button">Delete</button>
        </div>
      </div>
    </article>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
